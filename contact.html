<!doctype html> 
<html lang="en"> 
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" /> <!-- Enables responsive layout -->

<title>Site page template</title>

<link rel="stylesheet" href="css/styles.css" /> 

<style>
  .hero-image
{background-image: url("/assets/italy1.png");
}
</style>

<script src="js/includes.js" defer></script>

</head>

<body>
    
<!-- Header id will be left on the page so js will know where to drop in the header.html file -->
    <header id="site-header"></header>


    
<div class="hero-image">

        <h1>My Travel Portfolio</h1>
    

</div>
<main class="container">

  <h1>Contact Me</h1>
    
    <form action="https://formspree.io/f/xqayjrnd" method="POST" id="contact-form">
    <p>
        <label for="first-name">First Name</label>
        <input type="text" id="first-name" name="first-name"></p>
    
        <p><label for="last-name">Last Name</label>
        <input type="text" id="last-name" name="last-name"></p>

        <p><label for="email">Email</label>
        <input type="email" id="email" name="email">
        </p>
        <p><label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone"></p>
<p>
         <label for="message">Message</label>
        <textarea id="message" name="message" rows="8" cols="50"></textarea></p>
    

 <button type="submit" class="form">Enter</button>

</main>



<!-- Footer placeholder (if you're injecting footer too) -->
  <footer id="site-footer" class="site-footer"></footer>

  

</body>

</html>
